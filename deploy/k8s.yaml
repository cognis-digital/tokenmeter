apiVersion: apps/v1
kind: Deployment
metadata: { name: tokenmeter, labels: { app: tokenmeter } }
spec:
  replicas: 1
  selector: { matchLabels: { app: tokenmeter } }
  template:
    metadata: { labels: { app: tokenmeter } }
    spec:
      containers:
        - name: tokenmeter
          image: ghcr.io/cognis-digital/tokenmeter:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: tokenmeter }
spec:
  selector: { app: tokenmeter }
  ports: [{ port: 80, targetPort: 8000 }]
